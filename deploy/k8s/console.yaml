apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  labels:
    app.kubernetes.io/name: console
    app.kubernetes.io/part-of: rohrpost
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: console
        app.kubernetes.io/part-of: rohrpost
    spec:
      containers:
        - name: console
          image: rohrpost/console:dev-local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: console
  labels:
    app.kubernetes.io/name: console
    app.kubernetes.io/part-of: rohrpost
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: console
  ports:
    - name: http
      port: 31000
      targetPort: http
