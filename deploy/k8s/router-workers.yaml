apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-workers
  labels:
    app.kubernetes.io/name: router-workers
    app.kubernetes.io/part-of: rohrpost
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: router-workers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: router-workers
        app.kubernetes.io/part-of: rohrpost
    spec:
      initContainers:
        - name: wait-for-control-api
          image: rohrpost/runtime:dev-local
          imagePullPolicy: IfNotPresent
          command:
            - bun
            - -e
            - |
              for (;;) {
                try {
                  const response = await fetch("http://control-api:3001/health");
                  if (response.ok) process.exit(0);
                } catch {}
                await Bun.sleep(2_000);
              }
        - name: wait-for-nats
          image: rohrpost/runtime:dev-local
          imagePullPolicy: IfNotPresent
          command:
            - bun
            - -e
            - |
              for (;;) {
                try {
                  const response = await fetch("http://nats:8222/healthz");
                  if (response.ok) process.exit(0);
                } catch {}
                await Bun.sleep(2_000);
              }
        - name: wait-for-streams
          image: rohrpost/nats-box:dev-local
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: rohrpost-config
                  key: NATS_URL
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              until nats --server "$NATS_URL" stream info ingress --no-select >/dev/null 2>&1; do
                sleep 2
              done
      containers:
        - name: router-workers
          image: rohrpost/runtime:dev-local
          imagePullPolicy: IfNotPresent
          command:
            - bun
            - /app/apps/router-workers/src/index.ts
          env:
            - name: ROUTER_HTTP_HOST
              value: 0.0.0.0
            - name: ROUTER_HTTP_PORT
              value: "3002"
            - name: CONTROL_API_URL
              value: http://control-api:3001
            - name: CONTROL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rohrpost-secrets
                  key: BOOTSTRAP_API_TOKEN
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: rohrpost-config
                  key: NATS_URL
            - name: ROUTER_RUN_HISTORY_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: rohrpost-config
                  key: ROUTER_RUN_HISTORY_LIMIT
            - name: ROUTER_DLQ_HISTORY_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: rohrpost-config
                  key: ROUTER_DLQ_HISTORY_LIMIT
            - name: ROUTER_METRICS_FLUSH_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: rohrpost-config
                  key: ROUTER_METRICS_FLUSH_INTERVAL_MS
            - name: ROUTER_BACKLOG_WARNING_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: rohrpost-config
                  key: ROUTER_BACKLOG_WARNING_THRESHOLD
            - name: ROUTER_INGRESS_MAX_BUFFERED_PER_DEPLOYMENT
              valueFrom:
                configMapKeyRef:
                  name: rohrpost-config
                  key: ROUTER_INGRESS_MAX_BUFFERED_PER_DEPLOYMENT
            - name: ROUTER_INGRESS_MAX_BUFFERED_TOTAL
              valueFrom:
                configMapKeyRef:
                  name: rohrpost-config
                  key: ROUTER_INGRESS_MAX_BUFFERED_TOTAL
            - name: ROUTER_INGRESS_RETRY_AFTER_MS
              valueFrom:
                configMapKeyRef:
                  name: rohrpost-config
                  key: ROUTER_INGRESS_RETRY_AFTER_MS
            - name: ROUTER_PROCESSING_STALL_MS
              valueFrom:
                configMapKeyRef:
                  name: rohrpost-config
                  key: ROUTER_PROCESSING_STALL_MS
            - name: ROUTER_SINK_TARGETS_JSON
              valueFrom:
                configMapKeyRef:
                  name: rohrpost-config
                  key: ROUTER_SINK_TARGETS_JSON
            - name: WORKER_ID
              value: router-workers-k8s
            - name: ROUTER_NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: rohrpost-config
                  key: NATS_URL
          ports:
            - name: http
              containerPort: 3002
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: router-workers
  labels:
    app.kubernetes.io/name: router-workers
    app.kubernetes.io/part-of: rohrpost
spec:
  selector:
    app.kubernetes.io/name: router-workers
  ports:
    - name: http
      port: 3002
      targetPort: http
