apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-counting-sink
  labels:
    app.kubernetes.io/name: http-counting-sink
    app.kubernetes.io/part-of: rohrpost
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: http-counting-sink
  template:
    metadata:
      labels:
        app.kubernetes.io/name: http-counting-sink
        app.kubernetes.io/part-of: rohrpost
    spec:
      containers:
        - name: http-counting-sink
          image: rohrpost/runtime:dev-local
          imagePullPolicy: IfNotPresent
          command:
            - bun
            - /app/deploy/bin/http-counting-sink.ts
          env:
            - name: COUNTING_SINK_HOST
              value: 0.0.0.0
            - name: COUNTING_SINK_PORT
              value: "4011"
            - name: COUNTING_SINK_STATE_FILE
              value: /tmp/http-counting-sink.json
          ports:
            - name: http
              containerPort: 4011
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: http-counting-sink
  labels:
    app.kubernetes.io/name: http-counting-sink
    app.kubernetes.io/part-of: rohrpost
spec:
  selector:
    app.kubernetes.io/name: http-counting-sink
  ports:
    - name: http
      port: 4011
      targetPort: http
